:root {
  --gold:   #c9a84c;
  --gold2:  #e8c97a;
  --dark:   #0e0c09;
  --border: rgba(201,168,76,.18);
  --text:   #f0ead8;

}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--dark); color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; overflow-x: hidden; }

/* HERO */
.hero { position: relative; height: 92vh; min-height: 480px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.hero-bg { position: absolute; inset: 0; background: url('portada.jpg') center 40% / cover no-repeat; transform: scale(1.06); animation: heroZoom 20s ease-out forwards; }
@keyframes heroZoom { from{transform:scale(1.06)} to{transform:scale(1)} }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(rgba(14,12,9,.2) 0%, rgba(14,12,9,.5) 55%, rgba(14,12,9,.98) 100%); }
.hero-overlay::after { content:''; position:absolute; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); opacity:.4; pointer-events:none; }
.hero-logo { position:relative; z-index:2; width:200px; opacity:0; transform:translateY(18px); animation:fadeUp .9s .3s ease forwards; }
.hero-scroll { position:absolute; bottom:28px; left:50%; transform:translateX(-50%); z-index:2; display:flex; flex-direction:column; align-items:center; gap:8px; font-size:.62rem; letter-spacing:.28em; color:var(--muted); opacity:0; animation:fadeUp .9s 1s ease forwards; }
.hero-scroll-line { width:1px; height:38px; background:linear-gradient(to bottom,var(--gold),transparent); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
@keyframes fadeUp { to{opacity:1;transform:translateY(0)} }

/* NAV */
.nav-wrap { position:sticky; top:0; z-index:100; background:rgba(14,12,9,.93); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
.nav-inner { max-width:960px; margin:auto; padding:0 16px; display:flex; align-items:center; overflow-x:auto; scrollbar-width:none; gap:2px; }
.nav-inner::-webkit-scrollbar { display:none; }
.nav-btn { flex-shrink:0; background:none; border:none; color:var(--muted); font-family:'Jost',sans-serif; font-size:.67rem; font-weight:400; letter-spacing:.16em; text-transform:uppercase; padding:15px 12px; cursor:pointer; transition:color .25s; position:relative; white-space:nowrap; }
.nav-btn::after { content:''; position:absolute; bottom:0; left:12px; right:12px; height:2px; background:var(--gold); transform:scaleX(0); transition:transform .3s cubic-bezier(.4,0,.2,1); }
.nav-btn:hover { color:var(--text); }
.nav-btn.active { color:var(--gold); }
.nav-btn.active::after { transform:scaleX(1); }

/* MAIN */
main { max-width:960px; margin:0 auto; padding:60px 24px 130px; }

/* SECTION */
.section { margin-bottom:72px; opacity:0; transform:translateY(32px); transition:opacity .65s ease,transform .65s ease; }
.section.visible { opacity:1; transform:translateY(0); }
.section-img { width:100%; height:210px; object-fit:cover; border-radius:4px; margin-bottom:24px; filter:brightness(.85) saturate(.88); transition:filter .4s; }
.section-img:hover { filter:brightness(.94) saturate(1); }
.section-header { display:flex; align-items:flex-end; gap:18px; margin-bottom:24px; }
.section-title { font-family:'Cormorant Garamond',serif; font-weight:600; font-size:clamp(1.75rem,4vw,2.4rem); letter-spacing:.04em; line-height:1; color:var(--text); flex-shrink:0; }
.section-line { flex:1; height:1px; background:linear-gradient(to right,var(--border),transparent); margin-bottom:5px; }
.subsection-title { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.1rem; color:var(--gold); letter-spacing:.08em; margin:24px 0 10px; opacity:.85; }

/* ITEMS */
.menu-grid { display:grid; gap:0; }
.menu-item { display:flex; justify-content:space-between; align-items:baseline; gap:10px; padding:12px 0; border-bottom:1px solid var(--border); }
.menu-item:last-child { border-bottom:none; }
.item-dots { flex:1; border-bottom:1px dotted rgba(201,168,76,.18); margin:0 8px 4px; }
.item-name { font-size:.9rem; font-weight:300; color:var(--text); letter-spacing:.02em; flex-shrink:0; max-width:68%; }
.item-price { font-family:'Cormorant Garamond',serif; font-size:1.05rem; font-weight:400; color:var(--gold); white-space:nowrap; flex-shrink:0; }

/* WHATSAPP */
.whatsapp { position:fixed; right:20px; bottom:68px; width:52px; height:52px; background:#25d366; color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.45rem; z-index:999; box-shadow:0 4px 20px rgba(37,211,102,.4); transition:transform .25s,box-shadow .25s; text-decoration:none; }
.whatsapp:hover { transform:scale(1.1); box-shadow:0 6px 28px rgba(37,211,102,.6); }

/* GURU */
.guru-floating { position:fixed; left:10px; bottom:58px; transform:scale(.62); transform-origin:bottom left; z-index:999; }

/* FOOTER */
.footer { position:fixed; bottom:0; left:0; right:0; z-index:200; background:rgba(10,9,7,.97); border-top:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:8px 14px; font-size:.68rem; letter-spacing:.13em; color:var(--muted); text-transform:uppercase; }
.footer-dot { color:var(--gold); opacity:.55; font-size:.45rem; vertical-align:middle; }
.footer a { color:#1877f2; font-size:1.05rem; transition:color .2s,transform .2s; display:flex; align-items:center; }
.footer a:hover { color:#60a5fa; transform:scale(1.2); }

/* RESPONSIVE */
@media (max-width:600px) {
  .hero-logo { width:150px; }
  main { padding:36px 16px 120px; }
  .section-img { height:160px; }

  .item-name { font-size:.83rem; max-width:62%; }
}
@media (min-width:700px) { .menu-grid { grid-template-columns:1fr 1fr; gap:0 44px; } }
@media (min-width:900px) { ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:var(--dark)} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px} }

const app = document.getElementById('app');
const nav = document.getElementById('nav');
const sections = [];

function buildGrid(items) {
  const grid = document.createElement('div');
  grid.className = 'menu-grid';
  items.forEach(([name, price]) => {
    const div = document.createElement('div');
    div.className = 'menu-item';
    div.innerHTML = `<span class="item-name">${name}</span><span class="item-dots"></span><span class="item-price">$${price}</span>`;
    grid.appendChild(div);
  });
  return grid;
}

Object.entries(menuData).forEach(([cat, data]) => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn';
  btn.textContent = cat;
  nav.appendChild(btn);

  const sec = document.createElement('section');
  sec.className = 'section';
  sec.id = 'cat-' + cat.replace(/[\s\/]/g,'_');

  const img = document.createElement('img');
  img.src = data.img; img.alt = cat; img.className = 'section-img'; img.loading = 'lazy';
  sec.appendChild(img);

  const hdr = document.createElement('div');
  hdr.className = 'section-header';
  hdr.innerHTML = `<h2 class="section-title">${cat}</h2><div class="section-line"></div>`;
  sec.appendChild(hdr);

  if (data.subsections) {
    data.subsections.forEach(sub => {
      const st = document.createElement('p');
      st.className = 'subsection-title';
      st.textContent = sub.label;
      sec.appendChild(st);
      sec.appendChild(buildGrid(sub.items));
    });
  } else {
    sec.appendChild(buildGrid(data.items));
  }

  app.appendChild(sec);
  btn.onclick = () => sec.scrollIntoView({ behavior:'smooth', block:'start' });
  sections.push({ btn, sec });
});

const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.07 });

sections.forEach(({ sec }) => io.observe(sec));

window.addEventListener('scroll', () => {
  sections.forEach(({ btn, sec }) => {
    const r = sec.getBoundingClientRect();
    if (r.top < 130 && r.bottom > 130) {
      btn.classList.add('active');
      btn.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
    } else {
      btn.classList.remove('active');
    }
  });
}, { passive: true });
